{% extends "layout.html" %}
{% block title %}Generate Report — Attendify{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <div>
        <h1 class="text-2xl font-black text-gray-900 flex items-center gap-2">
            <i class="fa-solid fa-chart-column text-indigo-500"></i> Attendance Report
        </h1>
        <p class="text-sm text-gray-500 mt-0.5">Generate an Excel report for your subjects</p>
    </div>
    <a href="{{ url_for('teacher.dashboard') }}"
        class="inline-flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-semibold py-2 px-4 rounded-xl transition-all">
        <i class="fa-solid fa-arrow-left"></i> Dashboard
    </a>
</div>

<div class="max-w-2xl mx-auto">
    <div class="section-card p-8">
        <!-- Icon header -->
        <div class="flex items-center gap-4 mb-7 pb-5 border-b border-gray-100">
            <div class="w-14 h-14 grad-sky rounded-2xl flex items-center justify-center shadow-md">
                <i class="fa-solid fa-file-excel text-white text-2xl"></i>
            </div>
            <div>
                <h2 class="text-base font-bold text-gray-900">Configure Report</h2>
                <p class="text-xs text-gray-500">Select subject, division, and date range to export</p>
            </div>
        </div>

        <form method="POST" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <!-- Subject -->
                <div>
                    <label for="subject_id" class="block text-sm font-semibold text-gray-700 mb-1.5">Subject</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-book input-icon"></i>
                        <select id="subject_id" name="subject_id" required
                            class="input-field appearance-none cursor-pointer">
                            <option value="">Select Subject</option>
                            {% for subject in subjects %}
                            <option value="{{ subject.subject_id }}">{{ subject.subject_name }} ({{ subject.subject_code
                                }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <!-- Division -->
                <div>
                    <label for="division" class="block text-sm font-semibold text-gray-700 mb-1.5">Division <span
                            class="text-gray-400 font-normal">(Optional)</span></label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-users input-icon"></i>
                        <input type="text" id="division" name="division" placeholder="e.g., A" class="input-field">
                    </div>
                </div>
                <!-- Start Date -->
                <div>
                    <label for="start_date" class="block text-sm font-semibold text-gray-700 mb-1.5">Start Date</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-calendar input-icon"></i>
                        <input type="date" id="start_date" name="start_date" required class="input-field">
                    </div>
                </div>
                <!-- End Date -->
                <div>
                    <label for="end_date" class="block text-sm font-semibold text-gray-700 mb-1.5">End Date</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-calendar-check input-icon"></i>
                        <input type="date" id="end_date" name="end_date" required class="input-field">
                    </div>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="btn-primary w-full py-3 text-base">
                    <i class="fa-solid fa-file-arrow-down mr-2"></i>Generate Excel Report
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
