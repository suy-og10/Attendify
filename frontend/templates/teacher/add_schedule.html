{% extends "layout.html" %}
{% block title %}Add Schedule{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-6 text-gray-800">Add New Class Schedule</h1>

<div class="bg-white p-8 rounded-lg shadow-md max-w-2xl mx-auto">
    {% set form_data = form_data or {} %}
    <form method="POST">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="mb-4">
                <label for="subject_id" class="block text-gray-700 font-semibold mb-2">Subject:</label>
                <select id="subject_id" name="subject_id" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="">Select Subject</option>
                    {% for subject in subjects %}
                    <option value="{{ subject.subject_id }}" {% if form_data.get('subject_id') | int==subject.subject_id
                        %}selected{% endif %}>
                        {{ subject.subject_name }} ({{ subject.subject_code }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label for="division" class="block text-gray-700 font-semibold mb-2">Division:</label>
                <input type="text" id="division" name="division" required value="{{ form_data.get('division', '') }}"
                    maxlength="10"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase"
                    placeholder="e.g., A">
            </div>
            <div class="mb-4">
                <label for="academic_year" class="block text-gray-700 font-semibold mb-2">Academic Year:</label>
                <input type="text" id="academic_year" name="academic_year" required
                    value="{{ form_data.get('academic_year', '') }}" maxlength="10"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="e.g., SE or 2025-26">
            </div>
            <div class="mb-4">
                <label for="day_of_week" class="block text-gray-700 font-semibold mb-2">Day of Week:</label>
                <select id="day_of_week" name="day_of_week" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="">Select Day</option>
                    {% for i in range(days|length) %}
                    <option value="{{ i }}" {% if form_data.get('day_of_week')==i|string %}selected{% endif %}>{{
                        days[i] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4 md:col-span-2">
                <label for="classroom" class="block text-gray-700 font-semibold mb-2">Classroom (Optional):</label>
                <input type="text" id="classroom" name="classroom" value="{{ form_data.get('classroom', '') }}"
                    maxlength="50"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="e.g., C-101">
            </div>
            <div class="mb-4">
                <label for="start_time" class="block text-gray-700 font-semibold mb-2">Start Time:</label>
                <input type="time" id="start_time" name="start_time" required
                    value="{{ form_data.get('start_time', '') }}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label for="end_time" class="block text-gray-700 font-semibold mb-2">End Time:</label>
                <input type="time" id="end_time" name="end_time" required value="{{ form_data.get('end_time', '') }}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div> {# End Grid #}

        <div class="mt-6">
            <button type="submit"
                class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                Add Schedule
            </button>
        </div>
        <div class="mt-4 text-center">
            <a href="{{ url_for('teacher.dashboard') }}" class="text-gray-600 hover:underline text-sm">&larr; Cancel and
                return to Dashboard</a>
        </div>
    </form>
</div>
{% endblock %}
