{% extends "layout.html" %}
{% block title %}Department Attendance Report{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-6 text-gray-800">Department Attendance Reports</h1>

<div class="bg-white p-8 rounded-lg shadow-md max-w-4xl mx-auto">
    <form method="POST">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div>
                <label for="start_date" class="block text-gray-700 font-semibold mb-2">Start Date:</label>
                <input type="date" id="start_date" name="start_date" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="end_date" class="block text-gray-700 font-semibold mb-2">End Date:</label>
                <input type="date" id="end_date" name="end_date" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label for="subject_id" class="block text-gray-700 font-semibold mb-2">Subject (Optional):</label>
                <select id="subject_id" name="subject_id" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="all">All Subjects</option>
                    {% for subject in subjects %}
                    <option value="{{ subject.subject_id }}">{{ subject.subject_name }} ({{ subject.subject_code }})</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="division" class="block text-gray-700 font-semibold mb-2">Division (Optional):</label>
                <select id="division" name="division" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="all">All Divisions</option>
                    {% for div in divisions %}
                    <option value="{{ div.division }}">{{ div.division }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label for="academic_year" class="block text-gray-700 font-semibold mb-2">Academic Year (Optional):</label>
                <select id="academic_year" name="academic_year" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="all">All Years</option>
                    {% for year in academic_years %}
                    <option value="{{ year.academic_year }}">{{ year.academic_year }}</option>
                    {% endfor %}
                </select>
            </div>

        </div>

        <div class="mt-8 text-center">
            <button type="submit"
                    class="w-full md:w-auto bg-blue-600 text-white font-bold py-3 px-8 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                Generate Excel Report
            </button>
        </div>
    </form>
</div>
{% endblock %}
