{% extends "layout.html" %}
{% block title %}Add Subject{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-6 text-gray-800">Add New Subject</h1>

<div class="bg-white p-8 rounded-lg shadow-md max-w-lg mx-auto">
    {% set form_data = form_data or {} %}
    <form method="POST">
        <div class="mb-4">
            <label for="subject_code" class="block text-gray-700 font-semibold mb-2">Subject Code:</label>
            <input type="text" id="subject_code" name="subject_code" required value="{{ form_data.get('subject_code', '') }}" maxlength="20"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase" placeholder="e.g., CS301">
        </div>
        <div class="mb-4">
            <label for="subject_name" class="block text-gray-700 font-semibold mb-2">Subject Name:</label>
            <input type="text" id="subject_name" name="subject_name" required value="{{ form_data.get('subject_name', '') }}" maxlength="100"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g., Data Structures">
        </div>
        <div class="mb-4">
            <label for="semester" class="block text-gray-700 font-semibold mb-2">Semester:</label>
            <input type="number" id="semester" name="semester" required min="1" max="12" value="{{ form_data.get('semester', '') }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g., 3">
        </div>
        <div class="mb-6">
             <label class="flex items-center space-x-2 text-gray-700">
                <input type="checkbox" name="is_active" checked class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50">
                <span>Mark as Active</span>
             </label>
        </div>
        <div>
            <button type="submit"
                    class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                Add Subject
            </button>
        </div>
         <div class="mt-4 text-center">
             <a href="{{ url_for('hod.manage_subjects') }}" class="text-gray-600 hover:underline text-sm">&larr; Cancel and return to Subjects</a>
         </div>
    </form>
</div>
{% endblock %}
